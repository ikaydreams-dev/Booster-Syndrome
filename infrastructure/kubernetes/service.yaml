apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: booster-syndrome
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: booster-syndrome
spec:
  selector:
    app: user-service
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: booster-syndrome
spec:
  selector:
    app: analytics-service
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
  type: ClusterIP
