apiVersion: v1
kind: Secret
metadata:
  name: booster-secrets
  namespace: booster-syndrome
type: Opaque
stringData:
  JWT_SECRET: "change-this-secret-key-in-production"
  DATABASE_PASSWORD: "postgres-password"
  REDIS_PASSWORD: ""
  SMTP_PASSWORD: "smtp-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-secrets
  namespace: booster-syndrome
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "your-access-key"
  AWS_SECRET_ACCESS_KEY: "your-secret-key"
  S3_BUCKET: "booster-files"
