apiVersion: v1
kind: ConfigMap
metadata:
  name: booster-config
  namespace: booster-syndrome
data:
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq-service"
  RABBITMQ_PORT: "5672"
  LOG_LEVEL: "info"
  NODE_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: booster-syndrome
data:
  PORT: ":8000"
  AUTH_SERVICE_URL: "http://auth-service:8001"
  USER_SERVICE_URL: "http://user-service:8002"
  ANALYTICS_SERVICE_URL: "http://analytics-service:8003"
