apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booster-ingress
  namespace: booster-syndrome
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.booster-syndrome.com
    secretName: booster-tls
  rules:
  - host: api.booster-syndrome.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
