global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'booster-services'
    static_configs:
      - targets:
        - 'gateway:8080'
        - 'auth-service:3000'
        - 'user-service:3001'
        - 'analytics-service:8001'
    metrics_path: '/metrics'

  - job_name: 'infrastructure'
    static_configs:
      - targets:
        - 'postgres-exporter:9187'
        - 'redis-exporter:9121'
        - 'mongodb-exporter:9216'
