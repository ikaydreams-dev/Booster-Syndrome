---
- name: Deploy Booster Syndrome Services
  hosts: production
  become: yes
  vars:
    app_user: booster
    app_dir: /opt/booster-syndrome
    docker_registry: ghcr.io/ikaydreams-dev

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - nginx
          - postgresql-client
          - python3-pip
        state: present

    - name: Create application user
      user:
        name: "{{ app_user }}"
        system: yes
        create_home: yes
        home: "{{ app_dir }}"

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'
      loop:
        - "{{ app_dir }}/logs"
        - "{{ app_dir }}/data"
        - "{{ app_dir }}/backups"

    - name: Copy Docker Compose file
      template:
        src: docker-compose.prod.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0644'

    - name: Copy environment file
      template:
        src: .env.prod.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0600'

    - name: Pull latest Docker images
      docker_image:
        name: "{{ docker_registry }}/{{ item }}"
        tag: latest
        source: pull
      loop:
        - auth-service
        - gateway
        - user-service
        - analytics-service

    - name: Stop existing containers
      command: docker-compose down
      args:
        chdir: "{{ app_dir }}"
      ignore_errors: yes

    - name: Start services
      command: docker-compose up -d
      args:
        chdir: "{{ app_dir }}"

    - name: Wait for services to be ready
      wait_for:
        host: localhost
        port: "{{ item }}"
        delay: 5
        timeout: 60
      loop:
        - 3000
        - 8080
        - 3001

    - name: Configure NGINX
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/booster
        mode: '0644'

    - name: Enable NGINX site
      file:
        src: /etc/nginx/sites-available/booster
        dest: /etc/nginx/sites-enabled/booster
        state: link

    - name: Test NGINX configuration
      command: nginx -t

    - name: Reload NGINX
      service:
        name: nginx
        state: reloaded

    - name: Setup log rotation
      copy:
        dest: /etc/logrotate.d/booster
        content: |
          {{ app_dir }}/logs/*.log {
            daily
            rotate 14
            compress
            delaycompress
            notifempty
            create 0644 {{ app_user }} {{ app_user }}
          }
        mode: '0644'

    - name: Create backup cron job
      cron:
        name: "Backup Booster data"
        minute: "0"
        hour: "2"
        job: "{{ app_dir }}/scripts/backup.sh"
        user: "{{ app_user }}"

    - name: Run database migrations
      command: docker-compose exec -T auth-service /app/migrations/run.sh
      args:
        chdir: "{{ app_dir }}"

    - name: Verify deployment
      uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 5
      delay: 10
