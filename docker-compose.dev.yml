version: '3.9'

name: booster-syndrome-dev

services:
  # Infrastructure Services
  postgresql:
    image: postgres:15-alpine
    container_name: booster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: developer
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: booster_development
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/auth-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: booster-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 5s
      timeout: 3s
      retries: 10

  redis-cache:
    image: redis:7-alpine
    container_name: booster-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq-broker:
    image: rabbitmq:3.12-management-alpine
    container_name: booster-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: developer
      RABBITMQ_DEFAULT_PASS: devpassword
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 5

  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: booster-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=es-node-1
      - cluster.name=booster-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: booster-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: booster-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana

  # Application Services
  auth:
    build:
      context: ./services/auth-service
      dockerfile: ../../infrastructure/docker/auth-service.Dockerfile
    container_name: booster-auth
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://developer:devpassword@postgresql:5432/booster_development
      REDIS_URL: redis://redis-cache:6379
      JWT_SECRET: super-secret-jwt-key-dev-only
      RUST_LOG: debug
    depends_on:
      postgresql:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    volumes:
      - ./services/auth-service:/app

  api-gateway:
    build:
      context: ./services/gateway
      dockerfile: ../../infrastructure/docker/gateway.Dockerfile
    container_name: booster-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      GIN_MODE: debug
      REDIS_URL: redis://redis-cache:6379
      AUTH_SERVICE: http://auth:3000
    depends_on:
      - redis-cache
      - auth
    volumes:
      - ./services/gateway:/app

volumes:
  pg_data:
  mongo_data:
  redis_data:
  rabbitmq_data:
  elastic_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: booster-network
