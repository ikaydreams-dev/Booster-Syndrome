name: Go CI

on:
  push:
    branches: [ main ]
    paths:
      - 'services/go/**'
      - 'go.mod'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Build
      run: go build -v ./... || true
    
    - name: Test
      run: go test -v ./... || true
