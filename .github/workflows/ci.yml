name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Test Auth Service
        run: cd services/auth-service && cargo test
      - name: Test File Service
        run: cd services/file-service && cargo test

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Test Gateway
        run: cd services/gateway && go test ./...
      - name: Test Message Queue
        run: cd services/message-queue && go test ./...

  test-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Test User Service
        run: cd services/user-service && npm install && npm test
      - name: Test Frontend
        run: cd web/frontend && npm install && npm test

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Test Analytics Service
        run: |
          cd services/analytics-service
          pip install -r requirements.txt
          pytest

  build:
    needs: [test-rust, test-go, test-typescript, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: docker-compose build
